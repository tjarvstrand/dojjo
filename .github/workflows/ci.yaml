name: CLI

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          working_directory: cli
      - run: dart pub get
      - run: mise run format-check
      - run: mise run generate
      - run: mise run analyze
      - run: mise run test
      - run: mise run build

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: djo-linux-x64
          - os: macos-latest
            artifact: djo-macos-arm64
          - os: windows-latest
            artifact: djo-windows-x64.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          working_directory: cli
      - run: dart pub get
      - run: mise run generate
      - run: mise run build
      - name: Rename binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            mv build/djo.exe build/${{ matrix.artifact }}
          else
            mv build/djo build/${{ matrix.artifact }}
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: cli/build/${{ matrix.artifact }}
