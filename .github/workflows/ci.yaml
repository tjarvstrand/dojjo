name: CLI

on:
  push:
    branches: [main]
    tags: ['v[0-9]*']
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          working_directory: cli
      - run: mise run generate
      - run: mise run check
      - run: mise run test
      - run: mise run compile
      - run: mise run format # Ensure generated files don't break pana analysis
      - run: dart pub global activate pana
      - run: dart pub global run pana --exit-code-threshold 0

  release:
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '.')
    needs: check
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: djo-linux-x64
          - os: macos-latest
            artifact: djo-macos-arm64
          - os: windows-latest
            artifact: djo-windows-x64.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          working_directory: cli
      - run: mise run build
      - name: Rename binary
        shell: bash
        run: mv build/djo build/${{ matrix.artifact }}
      - uses: softprops/action-gh-release@v2
        with:
          files: cli/build/${{ matrix.artifact }}
